name: Demo GIF
on:
  push:
    branches: [main, 'demo-*']
    paths: [scripts/gen_demo.py]
  # pull_request disabled: GIFs generated locally, CI auto-commit causes conflicts
  # pull_request:
  #   paths: [scripts/gen_demo.py]

permissions:
  contents: write

jobs:
  gif:
    runs-on: ubuntu-latest
    env:
      PATH: /home/runner/.elan/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Cache tools
        id: tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libduckdb.so
            /usr/local/bin/prqlc
            ~/.elan
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo make duckdb prqlc
          make elan

      - name: ldconfig
        run: sudo ldconfig

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Install agg
        run: |
          curl -sL https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Record and generate GIFs
        run: timeout 600 python3 scripts/gen_demo.py

      - name: Upload GIFs
        uses: actions/upload-artifact@v4
        with:
          name: demo-gifs
          path: doc/*.gif
          retention-days: 7

      - name: Commit GIFs
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doc/*.gif
          if git diff --cached --quiet; then
            echo "No GIF changes to commit"
          else
            git commit -m "Regenerate demo GIFs"
            git push origin HEAD:${{ github.head_ref }}
          fi
