name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # ubuntu-latest (currently 24.04). Not pinned — we download our own tools so host version rarely matters.
    runs-on: ubuntu-latest
    env:
      PATH: /home/runner/.elan/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - uses: actions/checkout@v4

      # Separate caches: tools change with Makefile versions (rare), .lake changes with deps (frequent)
      # actions/cache restores here, saves at end of job
      - name: Cache tools
        id: tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libduckdb.so
            /usr/local/bin/prqlc
            ~/.elan
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install tools
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo make duckdb prqlc
          make elan

      # ldconfig needed even on cache hit (cache restores file but not ldconfig state)
      - name: ldconfig
        run: sudo ldconfig

      # Cache Lean build artifacts to avoid full recompilation (~10+ min) on each run
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Build and test
        run: make test
