name: CI
on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Arch: Ubuntu's DuckDB ADBC rejects multi-statement queries that Arch's newer DuckDB handles
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git duckdb curl unzip

      - uses: actions/checkout@v4

      - name: Install elan + Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain leanprover/lean4:v4.28.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-arch-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-arch-

      - name: Remove stale binaries
        run: rm -f .lake/build/bin/tc .lake/build/bin/test

      - name: Install prqlc
        run: make prqlc

      - name: Build and test
        run: make test
