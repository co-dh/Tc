name: CI
on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Official DuckDB release (distro packages lack ADBC support)
      # sudo: runner user can't write to /usr/local/{lib,bin}
      - name: Install DuckDB
        run: sudo make duckdb

      - name: Install elan + Lean toolchain
        run: |
          make elan
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      # Cache Lean build artifacts to avoid full recompilation (~10+ min) on each run
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Install prqlc
        run: sudo make prqlc

      - name: Build and test
        run: make test
