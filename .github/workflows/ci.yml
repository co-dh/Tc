name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan + Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain leanprover/lean4:v4.28.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Install DuckDB
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/download/v1.2.2/libduckdb-linux-amd64.zip -o /tmp/duckdb.zip
          unzip /tmp/duckdb.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - name: Build
        run: lake build tc test

      - name: Install prqlc
        run: curl -fsSL https://github.com/PRQL/prql/releases/download/0.13.10/prqlc-0.13.10-x86_64-unknown-linux-musl.tar.gz | sudo tar xz -C /usr/local/bin ./prqlc

      - name: Test
        run: .lake/build/bin/test || (cat test.log; exit 1)
