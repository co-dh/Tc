name: CI
on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Separate caches: tools change with Makefile versions (rare), .lake changes with deps (frequent)
      - name: Cache tools
        id: tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libduckdb.so
            /usr/local/bin/prqlc
            ~/.elan
          key: tools-${{ runner.os }}-duckdb${{ hashFiles('Makefile') }}

      - name: Install tools
        if: steps.tools.outputs.cache-hit != 'true'
        run: |
          sudo make duckdb prqlc
          make elan

      - name: Setup PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      # Ensure ldconfig knows about libduckdb (cache restores file but not ldconfig state)
      - name: ldconfig
        run: sudo ldconfig

      # Cache Lean build artifacts to avoid full recompilation (~10+ min) on each run
      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Build and test
        run: make test
