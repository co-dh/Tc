name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache .lake
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Install DuckDB
        run: |
          curl -LO https://github.com/duckdb/duckdb/releases/download/v1.2.1/libduckdb-linux-amd64.zip
          unzip libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - name: Build
        run: lake build

      - name: Test
        run: lake script runtest
